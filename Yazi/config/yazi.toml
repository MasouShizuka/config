[manager]

ratio       = [ 1, 4, 4 ]
sort_by     = "natural"
show_hidden = true

[opener]

edit = [
    { run = 'nvim "%*"',    block = true,  desc = "nvim",         for = "windows" },
    { run = 'code "%*"',    orphan = true, desc = "code",         for = "windows" },
    { run = 'code -w "%*"', block = true,  desc = "code (block)", for = "windows" },
    { run = 'nvim "$@"',    block = true,  desc = "nvim",         for = "unix" },
    { run = 'code "$@"',    orphan = true, desc = "code",         for = "unix" },
    { run = 'code -w "$@"', block = true,  desc = "code (block)", for = "unix" },
]

[open]

rules = [
    # windows 平台文件优先打开而不是编辑
    { name = "*/",                                             use = [ "open", "edit", "reveal" ]},

    { mime = "text/*",                                         use = [ "edit", "reveal" ] },
    { mime = "image/*",                                        use = [ "open", "reveal" ] },
    { mime = "{audio,video}/*",                                use = [ "play", "reveal" ] },
    { mime = "inode/x-empty",                                  use = [ "edit", "reveal" ] },

    # windows 平台压缩文件优先打开
    { mime = "application/*zip",                               use = [ "open", "extract", "reveal" ] },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", use = [ "open", "extract", "reveal" ] },

    { mime = "application/json",                               use = [ "edit", "reveal" ] },
    { mime = "*/javascript",                                   use = [ "edit", "reveal" ] },

    { mime = "*",                                              use = [ "open", "reveal" ] },
]

[plugin]

# 禁用 Pdf,Video 预览
preloaders = [
    { name = "*",       cond = "!mime", run = "mime", multi = true, prio = "high" },
    # Image
    { mime = "image/*", run = "image" },
]
prepend_previewers = [
    # Video
    { mime = "video/*",         run = "file" },
    # PDF
    { mime = "application/pdf", run = "file" },
]
