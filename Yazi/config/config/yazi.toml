[manager]

sort_by     = "natural"
show_hidden = true

[opener]

edit = [
    { run = 'nvim "%*"',    block = true,  desc = "nvim",         for = "windows" },
    { run = 'code "%*"',    orphan = true, desc = "code",         for = "windows" },
    { run = 'code -w "%*"', block = true,  desc = "code (block)", for = "windows" },
    { run = 'nvim "$@"',    block = true,  desc = "nvim",         for = "unix" },
    { run = 'code "$@"',    orphan = true, desc = "code",         for = "unix" },
    { run = 'code -w "$@"', block = true,  desc = "code (block)", for = "unix" },
]
extract = [
    { run = 'ouch d -y "%*"', desc = "Extract here with ouch", for = "windows" },
    { run = 'ouch d -y "$@"', desc = "Extract here with ouch", for = "unix" },
]

[open]

rules = [
    # windows 平台文件优先打开而不是编辑
    { name = "*/",                                             use = [ "open", "edit", "reveal" ]},

    { mime = "text/*",                                         use = [ "edit", "reveal" ] },
    { mime = "image/*",                                        use = [ "open", "reveal" ] },
    { mime = "{audio,video}/*",                                use = [ "play", "reveal" ] },
    { mime = "inode/x-empty",                                  use = [ "edit", "reveal" ] },

    { mime = "application/{,g}zip",                            use = [ "extract", "reveal" ] },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}", use = [ "extract", "reveal" ] },
    { mime = "application/vnd.rar",                            use = [ "extract", "reveal" ] },

    { mime = "application/{json,x-ndjson}",                    use = [ "edit", "reveal" ] },
    { mime = "*/javascript",                                   use = [ "edit", "reveal" ] },
    { mime = "text/x-tex",                                     use = [ "edit", "reveal" ] },

    { mime = "*",                                              use = [ "open", "reveal" ] },
]

[plugin]

preloaders = [
    # Image
    { mime = "image/{heic,jxl,svg+xml}",      run = "magick" },
    { mime = "image/*",                       run = "image" },
    # # Video
    # { mime = "video/*",                     run = "video" },
    # # PDF
    # { mime = "application/pdf",             run = "pdf" },
    # # Font
    # { mime = "font/*",                      run = "font" },
    # { mime = "application/vnd.ms-opentype", run = "font" },
]
previewers = [
    { name = "*/",                                                           run = "folder", sync = true },
    # Code
    { mime = "text/*",                                                       run = "bat" },
    { mime = "*/{xml,javascript,x-wine-extension-ini}",                      run = "bat" },
    { mime = "text/x-tex",                                                   run = "bat" },
    # JSON
    { mime = "application/{json,x-ndjson}",                                  run = "bat" },
    # Image
    { mime = "image/{heic,jxl,svg+xml}",                                     run = "magick" },
    { mime = "image/*",                                                      run = "image" },
    # # Video
    # { mime = "video/*",                                                    run = "video" },
    # # PDF
    # { mime = "application/pdf",                                            run = "pdf" },
    # Archive
    { mime = "application/{,g}zip",                                          run = "ouch" },
    { mime = "application/x-{tar,bzip*,7z-compressed,xz,rar,iso9660-image}", run = "ouch" },
    { mime = "application/vnd.rar",                                          run = "ouch" },
    # # Font
    # { mime = "font/*",                                                     run = "font" },
    # { mime = "application/vnd.ms-opentype",                                run = "font" },
    # Fallback
    { name = "*",                                                            run = "file" },
]
