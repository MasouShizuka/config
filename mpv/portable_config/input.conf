# mpv keybindings
#
# Location of user-defined bindings: ~/.config/mpv/input.conf
#
# Lines starting with # are comments. Use SHARP to assign the # key.
# Copy this file and uncomment and edit the bindings you want to change.
#
# List of commands and further details: DOCS/man/input.rst
# List of special keys: --input-keylist
# Keybindings testing mode: mpv --input-test --force-window --idle
#
# Use 'ignore' to unbind a key fully (e.g. 'Ctrl+a ignore').
#
# Strings need to be quoted and escaped:
#   KEY show-text "This is a single backslash: \\ and a quote: \" !"
#
# You can use modifier-key combinations like Shift+Left or Ctrl+Alt+x with
# the modifiers Shift, Ctrl, Alt and Meta (may not work on the terminal).
#
# The default keybindings are hardcoded into the mpv binary.
# You can disable them completely with: --no-input-default-bindings

# Developer note:
# On compilation, this file is baked into the mpv binary, and all lines are
# uncommented (unless '#' is followed by a space) - thus this file defines the
# default key bindings.

# If this is enabled, treat all the following bindings as default.
#default-bindings start



MBTN_LEFT     ignore
MBTN_LEFT_DBL cycle fullscreen
# MBTN_RIGHT    cycle pause
MBTN_MID      cycle pause
MBTN_BACK     playlist-prev
MBTN_FORWARD  playlist-next

# Mouse wheels, touchpad or other input devices that have axes
# if the input devices supports precise scrolling it will also scale the
# numeric value accordingly

#WHEEL_UP      seek 10          # seek 10 seconds forward
#WHEEL_DOWN    seek -10         # seek 10 seconds backward
#WHEEL_LEFT    add volume -2
#WHEEL_RIGHT   add volume 2
WHEEL_UP    add window-scale  0.1
WHEEL_DOWN  add window-scale -0.1
WHEEL_LEFT  seek              10
WHEEL_RIGHT seek             -10

## Seek units are in seconds, but note that these are limited by keyframes

#RIGHT seek  5                          # seek 5 seconds forward
#LEFT  seek -5                          # seek 5 seconds backward
#UP    seek  60                         # seek 1 minute forward
#DOWN  seek -60                         # seek 1 minute backward

RIGHT       seek         5
LEFT        seek        -5
UP          add volume   2
DOWN        add volume  -2
Shift+RIGHT seek        30
Shift+LEFT  seek       -30
Shift+UP    add volume  10
Shift+DOWN  add volume -10

l           seek         2
h           seek        -2
k           add volume   2; script-binding uosc/flash-volume
j           add volume  -2; script-binding uosc/flash-volume
L           seek        30
H           seek       -30
K           add volume  10
J           add volume -10

# Do smaller, always exact (non-keyframe-limited), seeks with Shift.
# Don't show them on the OSD (no-osd).

#Shift+RIGHT no-osd seek  1 exact       # seek exactly 1 second forward
#Shift+LEFT  no-osd seek -1 exact       # seek exactly 1 second backward
#Shift+UP    no-osd seek  5 exact       # seek exactly 5 seconds forward
#Shift+DOWN  no-osd seek -5 exact       # seek exactly 5 seconds backward

#Ctrl+LEFT   no-osd sub-seek -1         # seek to the previous subtitle
#Ctrl+RIGHT  no-osd sub-seek  1         # seek to the next subtitle
#Ctrl+Shift+LEFT sub-step -1            # change subtitle timing such that the previous subtitle is displayed
#Ctrl+Shift+RIGHT sub-step 1            # change subtitle timing such that the next subtitle is displayed

#Alt+left  add video-pan-x  0.1         # move the video right
#Alt+right add video-pan-x -0.1         # move the video left
#Alt+up    add video-pan-y  0.1         # move the video down
#Alt+down  add video-pan-y -0.1         # move the video up

#Alt++     add video-zoom   0.1         # zoom in
#Alt+-     add video-zoom  -0.1         # zoom out
#Alt+BS    set video-zoom   0 ; set video-pan-x 0 ; set video-pan-y 0 # reset zoom and pan settings

#PGUP add chapter 1                     # seek to the next chapter
#PGDWN add chapter -1                   # seek to the previous chapter
#Shift+PGUP seek 600                    # seek 10 minutes forward
#Shift+PGDWN seek -600                  # seek 10 minutes backward
x add chapter  1
X add chapter -1

#[ multiply speed 1/1.1                 # decrease the playback speed
#] multiply speed 1.1                   # increase the playback speed
#{ multiply speed 0.5                   # halve the playback speed
#} multiply speed 2.0                   # double the playback speed
#BS set speed 1.0                       # reset the speed to normal
w add      speed -0.1
e add      speed  0.1
W multiply speed  0.5
E multiply speed  2.0
q set      speed  1.0

#Shift+BS revert-seek                   # undo the previous (or marked) seek
#Shift+Ctrl+BS revert-seek mark         # mark the position for revert-seek

#q quit
#Q quit-watch-later                     # exit and remember the playback position
#q {encode} quit 4

ESC set fullscreen no
#ESC {encode} quit 4

#p cycle pause                          # toggle pause/playback mode

#. frame-step                           # advance one frame and pause
#, frame-back-step                      # go back by one frame and pause
f frame-step
d frame-back-step

SPACE cycle pause

#> playlist-next                        # skip to the next file
#ENTER playlist-next                    # skip to the next file
#< playlist-prev                        # skip to the previous file
. playlist-next
, playlist-prev

#O no-osd cycle-values osd-level 3 1    # toggle displaying the OSD on user interaction or always

#o show-progress                        # show playback progress
#P show-progress                        # show playback progress
\ show-progress

i script-binding stats/display-stats
I script-binding stats/display-stats-toggle

` script-binding console/enable

#z add sub-delay -0.1                   # Shift subtitles 100 ms earlier
#Z add sub-delay +0.1                   # delay subtitles by 100 ms
#x add sub-delay +0.1                   # delay subtitles by 100 ms
Ctrl+LEFT        add sub-delay -0.1
Ctrl+RIGHT       add sub-delay  0.1
Ctrl+Shift+LEFT  add sub-delay -1
Ctrl+Shift+RIGHT add sub-delay  1

#Ctrl++ add audio-delay 0.100           # change audio/video sync by delaying the audio
#Ctrl+- add audio-delay -0.100          # change audio/video sync by Shifting the audio earlier
Ctrl+UP         add audio-delay  0.1
Ctrl+DOWN       add audio-delay -0.1
Ctrl+Shift+UP   add audio-delay  1
Ctrl+Shift+DOWN add audio-delay -1

#Shift+g add sub-scale +0.1             # increase the subtitle font size
#Shift+f add sub-scale -0.1             # decrease the subtitle font size

#9 add volume -2
#/ add volume -2
#0 add volume  2
#* add volume  2

#m cycle mute                           # toggle mute
A cycle mute

#1 add contrast -1
#2 add contrast 1
#3 add brightness -1
#4 add brightness 1
#5 add gamma -1
#6 add gamma 1
#7 add saturation -1
#8 add saturation 1
#0 set contrast 0; set brightness 0; set gamma 0; set saturation 0; set hue 0

#Alt+0 set current-window-scale 0.5     # halve the window size
#Alt+1 set current-window-scale 1.0     # reset the window size
#Alt+2 set current-window-scale 2.0     # double the window size
- add      window-scale -0.1
= add      window-scale  0.1
_ multiply window-scale  0.5
+ multiply window-scale  2.0
0 set      window-scale  1.0

#d cycle deinterlace                    # toggle the deinterlacing filter

#r add sub-pos -1                       # move subtitles up
#R add sub-pos +1                       # move subtitles down
#t add sub-pos +1                       # move subtitles down
n add sub-pos -1
m add sub-pos +1

#v cycle sub-visibility                 # hide or show the subtitles
#Alt+v cycle secondary-sub-visibility   # hide or show the secondary subtitles
#V cycle sub-ass-vsfilter-aspect-compat # toggle stretching SSA/ASS subtitles with anamorphic videos to match the historical renderer
#u cycle-values sub-ass-override "force" "no" # toggle overriding SSA/ASS subtitle styles with the normal styles
#j cycle sub                            # switch subtitle track
#J cycle sub down                       # switch subtitle track backwards
s cycle sub
S cycle secondary-sid

#SHARP cycle audio                      # switch audio track
a cycle audio

#_ cycle video                          # switch video track
v cycle video

#T cycle ontop                          # toggle placing the video on top of other windows
t cycle ontop

#f cycle fullscreen                     # toggle fullscreen
ENTER    cycle fullscreen
KP_ENTER cycle fullscreen

#s screenshot                           # take a screenshot of the video in its original resolution with subtitles
#S screenshot video                     # take a screenshot of the video in its original resolution without subtitles
#Ctrl+s screenshot window               # take a screenshot of the window with OSD and subtitles
#Alt+s screenshot each-frame            # automatically screenshot every frame; issue this command again to stop taking screenshots
Ctrl+s screenshot video

#w add panscan -0.1                     # decrease panscan
#W add panscan +0.1                     # shrink black bars by cropping the video
#e add panscan +0.1                     # shrink black bars by cropping the video

#A cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1" # cycle the video aspect ratio ("-1" is the container aspect)

POWER       quit
PLAY        cycle pause
PAUSE       cycle pause
PLAYPAUSE   cycle pause
PLAYONLY    set   pause no
PAUSEONLY   set   pause yes
STOP        quit
FORWARD     seek  60
REWIND      seek -60
NEXT        playlist-next
PREV        playlist-prev
VOLUME_UP   add volume  2
VOLUME_DOWN add volume -2
MUTE        cycle mute
CLOSE_WIN   quit
CLOSE_WIN   {encode} quit 4

#Ctrl+w quit

#E cycle edition                        # switch edition

#l ab-loop                              # set/clear A-B loop points
#L cycle-values loop-file "inf" "no"    # toggle infinite looping

#Ctrl+c quit 4

#DEL script-binding osc/visibility      # cycle OSC visibility between never, auto (mouse-move) and always
# o    script-binding osc/visibility
# o script-binding osc_lazy/visibility
# o script-message cycle-commands "script-message osc-visibility always" "script-message osc-visibility never"

# Ctrl+h cycle-values hwdec "auto" "no" # toggle hardware decoding

#F8 show-text ${playlist}               # show the playlist
#F9 show-text ${track-list}             # show the list of video, audio and sub tracks
[ show-text ${playlist}
] show-text ${track-list}

#
# Legacy bindings (may or may not be removed in the future)
#
#! add chapter -1                       # seek to the previous chapter
#@ add chapter 1                        # seek to the next chapter

#
# Not assigned by default
# (not an exhaustive list of unbound commands)
#

# ? cycle sub-forced-only               # toggle DVD forced subs
# ? stop                                # stop playback (quit or enter idle mode)

b cycle play-dir

r cycle_values video-rotate 90 180 270 0

g vf toggle hflip
G vf toggle vflip



##############
# 着色器列表 #
##############

##在放大类滤镜/着色器之后加载的其它滤镜/着色器的计算速度都会显著变慢，尽量将放大类放在后排加载。例如先"cas_lumna.glsl"后"ACNet_HDN_L1.glsl"

##开启/关闭 单项：KrigBilateral（速度较慢，高级色度还原，极高质量但感知很弱）
CTRL+1 change-list glsl-shaders toggle "~~/shaders/KrigBilateral.glsl"
##开启/关闭 单项：AMD-FSR（速度很快，放大到目标分辨率，伴随对比度自适应锐化）
CTRL+2 change-list glsl-shaders toggle "~~/shaders/AMD-FSR.glsl"
##开启/关闭 单项：RAVUzr3（速度一般，放大到目标分辨率，轻微锐化）
CTRL+3 change-list glsl-shaders toggle "~~/shaders/ravu-zoom-r3.glsl"
##开启/关闭 单项：Anime4k-restore（速度快，无缩放，重建线条）
CTRL+4 change-list glsl-shaders toggle "~~/shaders/Anime4K_Restore_CNN_M.glsl"
##开启/关闭 单项：Anime4k-GAN（速度快，两倍放大，感知略强）
CTRL+5 change-list glsl-shaders toggle "~~/shaders/Anime4K_Upscale_GAN_x2_M.glsl"
##开启/关闭 单项：FSRCNNX8041（速度较慢，两倍放大，比较忠于原始画面）
CTRL+6 change-list glsl-shaders toggle "~~/shaders/FSRCNNX_x2_8-0-4-1.glsl"
##开启/关闭 单项：自适应锐化（速度一般，无缩放）
CTRL+7 change-list glsl-shaders toggle "~~/shaders/adaptive-sharpen.glsl"
##开启/关闭 单项：NNEDI3-64（速度很慢，两倍放大，忠于原始画面）
CTRL+8 change-list glsl-shaders toggle "~~/shaders/nnedi3-nns64-win8x4.glsl"

##覆盖式替换 组合：Anime4k的"DTDD"（速度较快，无缩放，加深线条+细化线条+中位降噪+高斯解糊，主观感知强）
CTRL+9 change-list glsl-shaders set    "~~/shaders/Anime4K_Darken_HQ.glsl;~~/shaders/Anime4K_Thin_HQ.glsl;~~/shaders/Anime4K_Denoise_Bilateral_Mode.glsl;~~/shaders/Anime4K_Deblur_DoG.glsl"
##覆盖式替换 组合：双SSIM（速度一般，辅助内建算法进行放大缩小）
CTRL+0 change-list glsl-shaders set    "~~/shaders/SSimSuperRes.glsl;~~/shaders/SSimDownscaler.glsl"

##清空所有已加载的着色器
CTRL+` change-list glsl-shaders clr    ""



##############
## 滤镜列表 ##
##############

##很多滤镜不支持 无-copy 的纯硬解方式（即 hwdec=xxxx )，最好使用 hwdec=no 或 hwdec=xxxx-copy 获得更好的兼容性

##VS补帧脚本只能同时启用一个，启用另一个前先关闭其他。其它未列出的方案按需添加修改 <shift+1、2、3、4、5>
##开启/关闭 mvtools 补帧通用版（推荐方案）
!     vf toggle vapoursynth="~~/vapoursynth/mvtools-standard.vpy"   # 开/关 补帧
##开启/关闭 mvtools 补帧快速版（低开销推荐方案）
@     vf toggle vapoursynth="~~/vapoursynth/mvtools-fast.vpy"       # 开/关 补帧（低质量）
##开启/关闭 svpflow 倍帧2d动画方案（更适合10bit/vfr动态帧率视频）[在软解下svpflow不支持10bit中间处理]
SHARP vf toggle vapoursynth="~~/vapoursynth/svpflow-2x.vpy"         # 开/关 补帧
##开启/关闭 svpflow 补帧8bit方案（低开销推荐方案）
$     vf toggle vapoursynth="~~/vapoursynth/svpflow-8b.vpy"         # 开/关 补帧（低质量）
##开启/关闭 svpflow 补帧高级方案（坛友的自用脚本）
%     vf toggle vapoursynth="~~/vapoursynth/svpflow-@Starlight.vpy" # 开/关 补帧（高质量）

##开启/关闭 强制片源的色阶标记为16-235 （少数片源存在压制后色彩范围标记错误，具体表现在背景纯黑显灰色/底色纯白却发绿，常见于野路子的小黄片） <shift+6>
^     vf toggle format=colorlevels=limited                          # 开/关 标记动态范围为有限
##开启/关闭 增加黑边（适用于2.35:1的片源适配16:9的字幕） <shift+7>
&     vf toggle pad=aspect=16/9:x=-1:y=-1                           # 开/关 填充16:9的黑边并居中

##开启/关闭 画面转动 <shift+8、9、0>
*     vf toggle rotate=angle=180*PI/180                             # 开/关 画面旋转180°
# (     vf toggle vflip                                               # 开/关 画面垂直翻转
# )     vf toggle hflip                                               # 开/关 画面水平翻转

##开启/关闭 伽马修正为2.2，可用于校色后的调整（默认ICC校正以BT.1886为目标曲线） <shift+->
# _     vf toggle format=gamma=gamma2.2                               # 开/关 伽马修正2.2

##开启/关闭 stab 稳定镜头方案（高开销）
# +     vf toggle vapoursynth="~~/vapoursynth/stab-high.vpy"          # 开/关 抗镜头晃动

##清除所有已加载的视频滤镜 <shift+`>
~     vf clr ""                                                     # 清空列表（视频滤镜）



