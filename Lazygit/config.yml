gui:
  language: 'en'
  expandFocusedSidePanel: true
  timeFormat: "2006-01-02 15:04"
  shortTimeFormat: '15:04'
  nerdFontsVersion: '3'
keybinding:
  universal:
    prevItem: 'k' # go one line up
    nextItem: 'j' # go one line down
    prevItem-alt: '<up>' # go one line up
    nextItem-alt: '<down>' # go one line down
    prevPage: '<c-u>' # go to next page in list
    nextPage: '<c-d>' # go to previous page in list
    gotoTop: 'g' # go to top of list
    gotoBottom: 'G' # go to bottom of list
    prevBlock: 'h' # goto the previous block / panel
    nextBlock: 'l' # goto the next block / panel
    prevBlock-alt: '<left>' # goto the previous block / panel
    nextBlock-alt: '<right>' # goto the next block / panel
    openRecentRepos: '<c-o>'
    scrollUpMain: '<c-k>' # main panel scroll up
    scrollDownMain: '<c-j>' # main panel scroll down
    scrollUpMain-alt1: '<pgup>' # main panel scroll up
    scrollDownMain-alt1: '<pgdown>' # main panel scroll down
    scrollUpMain-alt2: '<disabled>' # main panel scroll up
    scrollDownMain-alt2: '<disabled>' # main panel scroll down
    nextTab: '.'
    prevTab: ','
    nextScreenMode: '='
    prevScreenMode: '-'
    copyToClipboard: 'y'
    rangeSelectUp: 'K'
    rangeSelectDown: 'J'
  files:
    copyFileInfoToClipboard: 'Y'
  commits:
    viewResetOptions: '<backspace>'
    moveDownCommit: '>' # move commit down one
    moveUpCommit: '<' # move commit up one
    checkoutCommit: '<enter>'
    resetCherryPick: '<c-r>'
    copyCommitAttributeToClipboard: 'Y'
  stash:
    popStash: '<backspace>'
