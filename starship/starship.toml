# Configure the format of the prompt
format = '$os$all$fill$battery$time$line_break$character'

# Right prompt which renders on the same line as the input
right_format = ''

# Timeout for starship to scan files (in milliseconds)
scan_timeout = 30

# Timeout for commands executed by starship (in milliseconds)
command_timeout = 1000

# Inserts blank line between shell prompts
add_newline = false

# Sets which color palette from palettes to use.
# palette = ''

# Collection of color palettes that assign colors to user-defined names. Note that color palettes cannot reference their own color definitions
# palettes = {}



[battery]
full_symbol = '´ëÇ '
charging_symbol = '´âž '
discharging_symbol = '´çŽ  '
unknown_symbol = '´ëé '
empty_symbol = '´ëä '

[[battery.display]]
threshold = 10
style = '#fb4934'

[[battery.display]]
threshold = 25
style = '#fe8019'

[[battery.display]]
threshold = 75
style = '#fabd2f'

[[battery.display]]
threshold = 90
style = '#b8bb26'

[[battery.display]]
threshold = 100
style = '#8ec07c'



[character]
success_symbol = '[Ô×ť](green)'
error_symbol = '[ÔťŚ](red)'



[directory]
truncation_length = 0
style = 'cyan'
read_only = " ´áŻ"
use_os_path_sep = false



[fill]
symbol = ' '



[os]
style = 'blue'
disabled = false



[time]
format = '[´ÇŚ $time]($style)'
style = '#d6acff'
disabled = false



[username]
disabled = true



