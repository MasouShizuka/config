patch:
  app_options:
    code.exe:
      ascii_mode: true
    neovide.exe:
      ascii_mode: true
    wezterm-gui.exe:
      ascii_mode: true
    windowsterminal.exe:
      ascii_mode: true

  style:
    antialias_mode: default
    ascii_tip_follow_cursor: false
    color_scheme: win11dark
    font_face: Sarasa Mono SC Nerd Font
    label_font_face: Sarasa Mono SC Nerd Font
    comment_font_face: Sarasa Mono SC Nerd Font
    font_point: 20
    label_font_point: 20
    comment_font_point: 20
    horizontal: true
    fullscreen: false
    inline_preedit: true
    preedit_type: composition
    display_tray_icon: false
    label_format: "%s."
    mark_text: ""
    mouse_hover_ms: 0
    paging_on_scroll: false
    vertical_auto_reverse: false
    vertical_text: false
    vertical_text_left_to_right: false
    vertical_text_with_wrap: false
    layout:
      align_type: center
      max_width: 0	#set 0 to disable max width
      min_width: 160
      min_height: 0
      max_height: 0	#set 0 to disable max height
      border_width: 3
      margin_x: 0
      margin_y: 0
      spacing: 20
      candidate_spacing: 20
      hilite_spacing: 4
      hilite_padding: 2
      round_corner: 10   #别名 hilited_corner_radius
      corner_radius: 10
      shadow_radius: 0
      shadow_offset_x: 4
      shadow_offset_y: 4

  preset_color_schemes:
    win11dark:
      name: "Win11暗色 / Win11Dark"
      border_color:                   0x0c202020
      back_color:                     0x303030
      hilited_back_color:             0x20202020
      hilited_candidate_back_color:   0x7fd07c3a
      hilited_candidate_border_color: 0xd07c3a
      candidate_back_color:           0x07d07c3a
      hilited_text_color:             0xf9f9f9
      hilited_label_color:            0xf9f9f9
      hilited_candidate_text_color:   0xf9f9f9
      hilited_comment_text_color:     0xf9f9f9
      # hilited_mark_color:             0x212fe6
      text_color:                     0xc9c9c9
      label_color:                    0xc9c9c9
      candidate_text_color:           0xc9c9c9
      comment_text_color:             0xc9c9c9
      shadow_color:                   0x60000000
