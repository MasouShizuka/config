patch:
  app_options:
    alacritty.exe:
      ascii_mode: true
    code.exe:
      ascii_mode: true
    te64.exe:
      ascii_mode: true
    wezterm-gui.exe:
      ascii_mode: true
    windowsterminal.exe:
      ascii_mode: true

  style:
    color_scheme: default
    font_face: Sarasa Mono SC Nerd Font
    font_point: 20
    horizontal: true
    fullscreen: false
    inline_preedit: false
    preedit_type: composition
    display_tray_icon: false
    label_format: "%s."
    layout:
      min_width: 160
      min_height: 0
      border_width: 3
      margin_x: 12
      margin_y: 12
      spacing: 10
      candidate_spacing: 10
      hilite_spacing: 4
      hilite_padding: 2
      round_corner: 4

  preset_color_schemes:
    default:
      name: Default
      text_color: 0xdddddd                       # 默认文字颜色
      back_color: 0x4b4b4b                       # 候选窗背景色
      shadow_color: 0x00000000                   # 候选窗阴影色，默认全透明（无阴影）
      border_color: 0x4b4b4b                     # 候选窗边框颜色
      hilited_text_color: 0xdddddd               # 编码文字颜色
      hilited_back_color: 0x4b4b4b               # 编码背景颜色
      hilited_shadow_color: 0x00000000           # 编码背景块阴影颜色
      hilited_candidate_text_color: 0xffe696     # 高亮候选文字颜色
      hilited_candidate_back_color: 0x4b4b4b     # 高亮候选背景颜色
      hilited_candidate_shadow_color: 0x00000000 # 高亮候选背景块阴影颜色
      candidate_text_color: 0xffffff             # 非高亮候选文字颜色
      candidate_back_color: 0xeceeee             # 非高亮候选背景颜色
      candidate_shadow_color: 0x00000000         # 非高亮候选背景块阴影颜色
