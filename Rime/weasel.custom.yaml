patch:
  # 特定App默认中/英文输入
  app_options:
    code.exe:
      ascii_mode: true
    te64.exe:
      ascii_mode: true
    windowsterminal.exe:
      ascii_mode: true

  # 样式
  style:
    color_scheme: default
    font_face: Sarasa Mono SC Nerd Font
    font_point: 20
    horizontal: true
    fullscreen: false
    inline_preedit: false
    preedit_type: composition
    display_tray_icon: false
    label_format: "%s."
    layout:
      min_width: 160
      min_height: 0
      border_width: 3
      margin_x: 12
      margin_y: 12
      spacing: 10
      candidate_spacing: 10
      hilite_spacing: 4
      hilite_padding: 2
      round_corner: 4

  # 状态通知，可设为全开（always）全关（never）
  show_notifications_when: appropriate

  preset_color_schemes/default:
    name: 'Default'
    back_color: 0x4b4b4b                   # 背景
    border_color: 0x4b4b4b                 # 边框
    text_color: 0xdddddd                   # 内选区域 文字
    hilited_text_color: 0xdddddd           # 内选区域 高亮文字
    hilited_back_color: 0x4b4b4b           # 内选区域 高亮背景
    candidate_text_color: 0xffffff         # 候选项 文字
    comment_text_color: 0xdddddd           # 候选项 提示
    label_color: 0x999999                  # 候选项 编号
    hilited_candidate_back_color: 0x4b4b4b # 候选项 高亮背景
    hilited_candidate_text_color: 0xffe696 # 候选项 高亮文字
    hilited_comment_text_color: 0xdddddd   # 候选项 高亮提示
    hilited_label_color: 0x999999          # 候选项 高亮编号
